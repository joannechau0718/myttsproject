<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webnovel Narrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
    
    <style>
        :root {
            --mint: #B5EAD7;
            --mint-hover: #98d1bd;
            --lilac: #E0BBE4;
            --lilac-dark: #b892bc;
            --bg-color: #F9F6FA;
            --text-main: #5c4d5c;
            --text-light: #8e7d8e;
            --white: #ffffff;
            --shadow: 0 8px 24px rgba(224, 187, 228, 0.4);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #F9F6FA 0%, #edf1f4 100%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--white);
            max-width: 650px;
            width: 100%;
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 40px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--lilac-dark);
            margin-top: 0;
            font-size: 2.2em;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.95em;
        }

        input[type="password"],
        input[type="text"],
        select,
        textarea {
            font-family: 'Nunito', sans-serif;
            padding: 12px 16px;
            border: 2px solid var(--lilac);
            border-radius: 12px;
            background-color: #fffbfe;
            color: var(--text-main);
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--mint);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1em;
            color: var(--text-main);
        }

        .btn-paste {
            background-color: var(--lilac);
            flex: 1;
        }

        .btn-paste:hover {
            background-color: var(--lilac-dark);
            color: var(--white);
        }

        .btn-generate {
            background-color: var(--mint);
            width: 100%;
            font-size: 1.1em;
            padding: 16px;
            margin-top: 10px;
        }

        .btn-generate:hover {
            background-color: var(--mint-hover);
            color: var(--white);
        }
        
        .btn-generate:disabled {
            background-color: #e0e0e0;
            cursor: not-allowed;
            color: #999;
        }

        #activityLog {
            margin-top: 25px;
            background-color: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85em;
            color: var(--text-light);
            border: 1px dashed var(--lilac);
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        #downloadSection {
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .btn-download {
            background-color: var(--lilac-dark);
            color: var(--white);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            display: inline-block;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Storyteller ✨</h1>

    <div class="form-group">
        <label for="apiKey">Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="Enter your API key (saved locally)">
    </div>

    <div class="form-group">
        <label for="voiceSelect">Narrator Voice</label>
        <select id="voiceSelect">
            <option value="voice-1">Aoife (Soft & Ethereal)</option>
            <option value="voice-2">Puck (Warm & Playful)</option>
            <option value="voice-3">Oberon (Deep & Resonant)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="emotionInput">Emotion & Style Instructions</label>
        <input type="text" id="emotionInput" placeholder="e.g., Read slowly with a melancholic, gentle tone...">
    </div>

    <div class="form-group">
        <label for="textInput">Story Text</label>
        <div class="button-group">
            <button class="btn-paste" id="pasteBtn">📋 Paste from Clipboard</button>
        </div>
        <textarea id="textInput" placeholder="Once upon a time..."></textarea>
    </div>

    <button class="btn-generate" id="generateBtn">✨ Generate Audio ✨</button>

    <div id="activityLog">
        <div class="log-entry">Waiting for input...</div>
    </div>

    <div id="downloadSection">
        <a id="downloadLink" class="btn-download" download="webnovel_narration.mp3">⬇️ Download MP3</a>
    </div>
</div>

<script>
    // --- UI Elements ---
    const apiKeyInput = document.getElementById('apiKey');
    const voiceSelect = document.getElementById('voiceSelect');
    const emotionInput = document.getElementById('emotionInput');
    const textInput = document.getElementById('textInput');
    const pasteBtn = document.getElementById('pasteBtn');
    const generateBtn = document.getElementById('generateBtn');
    const activityLog = document.getElementById('activityLog');
    const downloadSection = document.getElementById('downloadSection');
    const downloadLink = document.getElementById('downloadLink');

    // --- Initialization & LocalStorage ---
    window.onload = () => {
        const savedKey = localStorage.getItem('gemini_tts_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
    };

    apiKeyInput.addEventListener('change', () => {
        localStorage.setItem('gemini_tts_api_key', apiKeyInput.value.trim());
    });

    // --- Utility: Activity Logger ---
    function logMessage(msg) {
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString();
        entry.textContent = `[${time}] ${msg}`;
        activityLog.appendChild(entry);
        activityLog.scrollTop = activityLog.scrollHeight;
    }

    // --- Feature: Clipboard Paste ---
    pasteBtn.addEventListener('click', async () => {
        try {
            const text = await navigator.clipboard.readText();
            textInput.value = text;
            logMessage("Text pasted from clipboard.");
        } catch (err) {
            logMessage("Failed to read clipboard. Permissions missing?");
        }
    });

    // --- Core Feature: Intelligent Chunking ---
    // Splits by punctuation to avoid cutting words/sentences, max ~800 chars.
    function chunkText(text, maxLength = 800) {
        const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
        const chunks = [];
        let currentChunk = "";

        for (let sentence of sentences) {
            if ((currentChunk.length + sentence.length) > maxLength) {
                if (currentChunk) chunks.push(currentChunk.trim());
                currentChunk = sentence;
            } else {
                currentChunk += " " + sentence;
            }
        }
        if (currentChunk.trim()) chunks.push(currentChunk.trim());
        return chunks.length ? chunks : [text];
    }

    // --- Core Feature: Exponential Backoff Fetch ---
    async function fetchWithBackoff(url, options, maxRetries = 4, baseDelayMs = 1000) {
        for (let attempt = 0; attempt < maxRetries; attempt++) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if (response.status === 429 || response.status >= 500) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    // For 400s (bad request), don't retry, just fail out.
                    throw new Error(`Fatal API Error: ${response.status}`);
                }
                return response;
            } catch (error) {
                if (attempt === maxRetries - 1) throw error;
                const delay = baseDelayMs * Math.pow(2, attempt);
                logMessage(`Fetch failed (${error.message}). Retrying in ${delay}ms...`);
                await new Promise(resolve => setTimeout(resolve, delay));
            }
        }
    }

    // --- Core Feature: API Interaction ---
    async function generateAudioChunk(chunkText, apiKey, voice, emotion) {
        // NOTE: Replace this URL with the actual Gemini TTS API endpoint you are using.
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateTextToSpeech?key=${apiKey}`;

        const payload = {
            text: chunkText,
            voice: voice,
            instructions: emotion,
            outputFormat: "RAW_PCM" // Assuming API accepts this flag
        };

        const response = await fetchWithBackoff(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        /* * NOTE ON API RESPONSE: 
         * If the API returns a direct binary stream of raw PCM:
         * const arrayBuffer = await response.arrayBuffer();
         * return new Int16Array(arrayBuffer);
         * * If the API returns JSON with Base64 encoded audio (common for Google APIs):
         * const json = await response.json();
         * const binaryString = window.atob(json.audioContent);
         * const len = binaryString.length;
         * const bytes = new Uint8Array(len);
         * for (let i = 0; i < len; i++) { bytes[i] = binaryString.charCodeAt(i); }
         * return new Int16Array(bytes.buffer);
         */

        // Assuming direct ArrayBuffer return for RAW PCM as requested
        const arrayBuffer = await response.arrayBuffer();
        return new Int16Array(arrayBuffer); 
    }

    // --- Core Feature: Encoding to MP3 ---
    function encodeToMP3(pcmArrays) {
        // lamejs setup: 1 channel (mono), 44100 sample rate, 128 kbps
        // Adjust sample rate (44100, 24000, 16000) based on actual API specs!
        const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);
        const mp3Data = [];

        logMessage("Encoding stitched PCM data to MP3...");

        for (let i = 0; i < pcmArrays.length; i++) {
            const chunk = pcmArrays[i];
            const mp3buf = mp3encoder.encodeBuffer(chunk);
            if (mp3buf.length > 0) {
                mp3Data.push(new Int8Array(mp3buf));
            }
        }

        const finalBuffer = mp3encoder.flush();
        if (finalBuffer.length > 0) {
            mp3Data.push(new Int8Array(finalBuffer));
        }

        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    // --- Main Execution Loop ---
    generateBtn.addEventListener('click', async () => {
        const apiKey = apiKeyInput.value.trim();
        const text = textInput.value.trim();
        const voice = voiceSelect.value;
        const emotion = emotionInput.value.trim();

        if (!apiKey) return alert("Please enter your API key.");
        if (!text) return alert("Please enter some text to narrate.");

        // UI Reset
        generateBtn.disabled = true;
        downloadSection.style.display = 'none';
        activityLog.innerHTML = '';
        logMessage("Starting generation process...");

        try {
            const chunks = chunkText(text, 800);
            logMessage(`Text chunked into ${chunks.length} segment(s).`);

            const pcmArrays = [];

            // Sequential fetch loop
            for (let i = 0; i < chunks.length; i++) {
                logMessage(`Fetching audio for chunk ${i + 1}/${chunks.length}...`);
                const pcmData = await generateAudioChunk(chunks[i], apiKey, voice, emotion);
                pcmArrays.push(pcmData);
                logMessage(`Chunk ${i + 1} retrieved successfully.`);
            }

            logMessage("All chunks fetched. Stitching audio...");
            
            // Encode stitched PCM arrays to MP3 Blob
            const mp3Blob = encodeToMP3(pcmArrays);
            
            // Create download link
            const url = URL.createObjectURL(mp3Blob);
            downloadLink.href = url;
            downloadSection.style.display = 'block';
            
            logMessage("✅ MP3 ready for download!");

        } catch (error) {
            console.error(error);
            logMessage(`❌ Error: ${error.message}`);
        } finally {
            generateBtn.disabled = false;
        }
    });

</script>
</body>
</html>
