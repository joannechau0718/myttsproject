<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Novel Narrator</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'serif': ['"Playfair Display"', 'serif'],
                        'sans': ['"Nunito"', 'sans-serif'],
                    },
                    colors: {
                        cream: '#FFFBF9',
                        blush: '#FFD1DC',
                        peach: '#FFE5B4',
                        taupe: '#9C8987',
                        mocha: '#5C4E4D',
                        glass: 'rgba(255, 255, 255, 0.65)'
                    },
                    boxShadow: {
                        'glass': '0 10px 40px -10px rgba(255, 182, 193, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top left, #FFF0F5, transparent 50%),
                        radial-gradient(circle at bottom right, #FFE4E1, transparent 50%),
                        #FFFBF9;
            background-attachment: fixed;
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Custom Scrollbar for the journal */
        .journal-scroll::-webkit-scrollbar {
            width: 8px;
        }
        .journal-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
        .journal-scroll::-webkit-scrollbar-thumb {
            background: #FFD1DC;
            border-radius: 10px;
        }
        .journal-scroll::-webkit-scrollbar-thumb:hover {
            background: #FFB6C1;
        }

        /* Toast Animation */
        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s ease-out;
        }
        .toast-exit {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-exit-active {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s ease-in;
        }

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #5C4E4D;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-mocha font-sans py-10 px-4 flex justify-center items-center">

    <main class="w-full max-w-3xl glass-card rounded-[2.5rem] shadow-glass p-8 md:p-12">
        <header class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-serif font-semibold mb-2">K-Novel Narrator</h1>
            <p class="text-taupe text-sm md:text-base">Transform your favorite webnovels into beautiful audiobooks.</p>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-sm font-semibold text-taupe mb-1 ml-2">API Key</label>
                    <input type="password" id="api-key" placeholder="Gemini API Key..." class="w-full bg-white/70 border border-white/50 text-mocha rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blush transition-all shadow-sm">
                </div>
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-sm font-semibold text-taupe mb-1 ml-2">Voice Model</label>
                    <select id="voice-select" class="w-full bg-white/70 border border-white/50 text-mocha rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blush transition-all shadow-sm appearance-none cursor-pointer">
                        <option value="Kore">Kore</option>
                        <option value="Aoede">Aoede</option>
                        <option value="Zephyr">Zephyr</option>
                        <option value="Puck">Puck</option>
                        <option value="Charon">Charon</option>
                        <option value="Fenrir">Fenrir</option>
                    </select>
                </div>
                <div class="col-span-1 md:col-span-1">
                    <label class="block text-sm font-semibold text-taupe mb-1 ml-2">Emotion / Style</label>
                    <input type="text" id="style-input" placeholder="e.g., softly, with longing" class="w-full bg-white/70 border border-white/50 text-mocha rounded-full px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blush transition-all shadow-sm">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-1 ml-2 mr-2">
                    <label class="block text-sm font-semibold text-taupe">Story Chapter</label>
                    <div class="space-x-3 text-xs font-semibold text-taupe">
                        <button id="btn-paste" class="hover:text-mocha transition-colors">Paste</button>
                        <button id="btn-clear" class="hover:text-red-400 transition-colors">Clear</button>
                    </div>
                </div>
                <textarea id="story-input" rows="8" placeholder="Paste your chapter here..." class="w-full bg-white/70 border border-white/50 text-mocha rounded-[1.5rem] p-5 focus:outline-none focus:ring-2 focus:ring-blush transition-all shadow-sm resize-y"></textarea>
            </div>

            <button id="btn-generate" class="w-full bg-blush/80 hover:bg-blush border border-white/60 text-mocha font-bold text-lg rounded-full py-4 transition-all shadow-sm flex items-center justify-center space-x-2">
                <span>Create Audiobook</span>
                <div id="loading-spinner" class="spinner hidden"></div>
            </button>

            <div id="journal-container" class="hidden flex-col space-y-4">
                <div class="bg-white/40 border border-white/50 rounded-[1.5rem] p-5 shadow-inner">
                    <h3 class="text-sm font-serif font-semibold text-taupe border-b border-white/40 pb-2 mb-3">Activity Journal</h3>
                    <div id="journal-logs" class="journal-scroll h-32 overflow-y-auto space-y-2 text-sm font-mono text-mocha/80">
                        </div>
                </div>

                <div id="audio-output" class="hidden flex-col items-center bg-white/60 border border-white/50 rounded-[1.5rem] p-6 shadow-sm space-y-4">
                    <h3 class="text-lg font-serif font-semibold text-mocha">Your Audiobook is Ready 🌸</h3>
                    <audio id="audio-player" controls class="w-full"></audio>
                    <a id="download-link" class="bg-mocha/10 hover:bg-mocha/20 text-mocha font-semibold rounded-full px-6 py-2 transition-all cursor-pointer">
                        Download MP3
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-white/80 backdrop-blur-xl border border-white/60 text-mocha px-6 py-3 rounded-full shadow-lg flex items-center space-x-3 toast-enter hidden z-50">
        <span id="toast-icon">✨</span>
        <span id="toast-message" class="text-sm font-semibold">Notification</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const elements = {
                apiKey: document.getElementById('api-key'),
                voiceSelect: document.getElementById('voice-select'),
                styleInput: document.getElementById('style-input'),
                storyInput: document.getElementById('story-input'),
                btnPaste: document.getElementById('btn-paste'),
                btnClear: document.getElementById('btn-clear'),
                btnGenerate: document.getElementById('btn-generate'),
                spinner: document.getElementById('loading-spinner'),
                journalContainer: document.getElementById('journal-container'),
                journalLogs: document.getElementById('journal-logs'),
                audioOutput: document.getElementById('audio-output'),
                audioPlayer: document.getElementById('audio-player'),
                downloadLink: document.getElementById('download-link'),
                toast: document.getElementById('toast'),
                toastMsg: document.getElementById('toast-message'),
                toastIcon: document.getElementById('toast-icon')
            };

            // Constants
            const CHUNK_LIMIT = 800; // Optimal for TTS pacing and limits
            const SAMPLE_RATE = 24000; // Gemini standard PCM sample rate
            
            // Initialization
            elements.apiKey.value = localStorage.getItem('gemini_api_key') || '';
            elements.apiKey.addEventListener('change', (e) => localStorage.setItem('gemini_api_key', e.target.value));

            // -- UI Utilities --
            
            function showToast(message, type = 'info') {
                elements.toastMsg.textContent = message;
                elements.toastIcon.textContent = type === 'error' ? '❌' : (type === 'success' ? '🌸' : '✨');
                elements.toast.classList.remove('hidden', 'toast-exit', 'toast-exit-active');
                elements.toast.classList.add('toast-enter-active');
                
                setTimeout(() => {
                    elements.toast.classList.remove('toast-enter-active');
                    elements.toast.classList.add('toast-exit-active');
                    setTimeout(() => {
                        elements.toast.classList.add('hidden');
                        elements.toast.classList.remove('toast-exit-active');
                    }, 300);
                }, 3000);
            }

            function logJournal(message, isError = false) {
                const time = new Date().toLocaleTimeString([], { hour12: false });
                const logEntry = document.createElement('div');
                logEntry.innerHTML = `<span class="text-taupe/60">[${time}]</span> <span class="${isError ? 'text-red-400 font-semibold' : ''}">${message}</span>`;
                elements.journalLogs.appendChild(logEntry);
                elements.journalLogs.scrollTop = elements.journalLogs.scrollHeight;
            }

            // -- Button Actions --

            elements.btnPaste.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    elements.storyInput.value += text;
                    showToast('Pasted successfully!');
                } catch (err) {
                    showToast('Clipboard access denied', 'error');
                }
            });

            elements.btnClear.addEventListener('click', () => {
                elements.storyInput.value = '';
            });

            // -- Core Logic --

            function chunkText(text, limit) {
                const chunks = [];
                let remaining = text.trim();

                while (remaining.length > 0) {
                    if (remaining.length <= limit) {
                        chunks.push(remaining);
                        break;
                    }

                    let splitIndex = -1;
                    
                    // Priority 1: Double newlines (paragraphs)
                    splitIndex = remaining.lastIndexOf('\n\n', limit);
                    
                    // Priority 2: Sentence endings
                    if (splitIndex === -1) {
                        const match = remaining.substring(0, limit).match(/[.!?]["']?\s+(?=[A-Z])/g);
                        if (match) {
                            splitIndex = remaining.lastIndexOf(match[match.length - 1], limit);
                            if(splitIndex !== -1) splitIndex += match[match.length-1].length - 1;
                        }
                    }

                    // Priority 3: Spaces
                    if (splitIndex === -1) {
                        splitIndex = remaining.lastIndexOf(' ', limit);
                    }

                    // Fallback: Hard cut if no spaces found
                    if (splitIndex === -1 || splitIndex === 0) {
                        splitIndex = limit;
                    }

                    chunks.push(remaining.substring(0, splitIndex).trim());
                    remaining = remaining.substring(splitIndex).trim();
                }
                return chunks;
            }

            function base64ToInt16Array(base64) {
                const binaryString = window.atob(base64);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return new Int16Array(bytes.buffer);
            }

            async function fetchTTSChunk(text, voice, style, apiKey, retries = 3) {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const promptText = style.trim() ? `Say ${style.trim()}:\n\n${text}` : text;
                
                const payload = {
                    contents: [{ role: "user", parts: [{ text: promptText }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: {
                                prebuiltVoiceConfig: {
                                    voiceName: voice
                                }
                            }
                        }
                    }
                };

                for (let attempt = 0; attempt < retries; attempt++) {
                    try {
                        const response = await fetch(endpoint, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            if (response.status === 429) throw new Error("Rate limit exceeded");
                            const errData = await response.json();
                            throw new Error(errData.error?.message || `API Error: ${response.status}`);
                        }

                        const data = await response.json();
                        
                        // Extract standard base64 PCM16 inlineData
                        const base64Audio = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        
                        if (!base64Audio) {
                            throw new Error("No audio data returned in response.");
                        }

                        return base64ToInt16Array(base64Audio);

                    } catch (error) {
                        if (attempt === retries - 1) throw error;
                        const delay = Math.pow(2, attempt) * 1500; // Exponential backoff (1.5s, 3s, etc.)
                        logJournal(`Chunk failed (${error.message}). Retrying in ${delay/1000}s...`);
                        await new Promise(r => setTimeout(r, delay));
                    }
                }
            }

            function encodeMP3(buffers) {
                if (typeof lamejs === 'undefined') {
                    throw new Error("LameJS library failed to load.");
                }

                const channels = 1; 
                const kbps = 128;
                const mp3encoder = new lamejs.Mp3Encoder(channels, SAMPLE_RATE, kbps);
                const mp3Data = [];
                const sampleBlockSize = 1152; // LameJS max block size

                for (let buffer of buffers) {
                    for (let i = 0; i < buffer.length; i += sampleBlockSize) {
                        const sampleChunk = buffer.subarray(i, i + sampleBlockSize);
                        const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                        if (mp3buf.length > 0) {
                            mp3Data.push(mp3buf);
                        }
                    }
                }

                const finalBuf = mp3encoder.flush();
                if (finalBuf.length > 0) {
                    mp3Data.push(finalBuf);
                }

                return new Blob(mp3Data, { type: 'audio/mp3' });
            }

            // -- Main Execution --

            elements.btnGenerate.addEventListener('click', async () => {
                const text = elements.storyInput.value.trim();
                const apiKey = elements.apiKey.value.trim();
                const voice = elements.voiceSelect.value;
                const style = elements.styleInput.value;

                if (!apiKey) return showToast("Please enter your API Key.", "error");
                if (!text) return showToast("Please paste some story text.", "error");

                // UI Reset
                elements.btnGenerate.disabled = true;
                elements.spinner.classList.remove('hidden');
                elements.btnGenerate.classList.add('opacity-70', 'cursor-not-allowed');
                elements.journalContainer.classList.remove('hidden');
                elements.audioOutput.classList.add('hidden');
                elements.journalLogs.innerHTML = '';
                
                logJournal('Processing initiated...');

                try {
                    const chunks = chunkText(text, CHUNK_LIMIT);
                    logJournal(`Story split into ${chunks.length} manageable chunks.`);

                    const audioBuffers = [];

                    for (let i = 0; i < chunks.length; i++) {
                        logJournal(`Fetching audio for part ${i + 1} of ${chunks.length}...`);
                        const pcmData = await fetchTTSChunk(chunks[i], voice, style, apiKey);
                        audioBuffers.push(pcmData);
                        
                        // Add a small delay between requests to avoid rapid rate-limiting
                        if (i < chunks.length - 1) {
                            await new Promise(r => setTimeout(r, 1000));
                        }
                    }

                    logJournal('All parts fetched. Stitching and encoding to MP3...');
                    
                    // Use a timeout to allow UI update before heavy CPU encoding task
                    await new Promise(r => setTimeout(r, 100)); 
                    
                    const mp3Blob = encodeMP3(audioBuffers);
                    const mp3Url = URL.createObjectURL(mp3Blob);

                    // Setup Player and Download
                    elements.audioPlayer.src = mp3Url;
                    elements.downloadLink.href = mp3Url;
                    
                    const safeName = text.substring(0, 25).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                    elements.downloadLink.download = `k_novel_${safeName}.mp3`;

                    elements.audioOutput.classList.remove('hidden');
                    elements.audioOutput.classList.add('flex');
                    logJournal('MP3 created successfully! 🌸');
                    showToast('Audiobook generation complete!', 'success');

                } catch (error) {
                    logJournal(`Generation aborted: ${error.message}`, true);
                    showToast("An error occurred. Check journal.", "error");
                    console.error(error);
                } finally {
                    elements.btnGenerate.disabled = false;
                    elements.spinner.classList.add('hidden');
                    elements.btnGenerate.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            });
        });
    </script>
</body>
</html>
